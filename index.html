<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Cursos</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf9f6;
  --paper: #fffffe;
  --paper2: #f5f4f0;
  --line: #e8e4dc;
  --line-blue: #c8d8f0;
  --ink: #1a1a2e;
  --ink2: #4a4a6a;
  --muted: #9898b0;
  --accent: #3b5bdb;
  --accent-light: #e8edff;
  --red: #e03131;
  --red-light: #fff0f0;
  --green: #2f9e44;
  --green-light: #ebfbee;
  --orange: #e67700;
  --orange-light: #fff3e0;
  --yellow: #f59f00;
  --purple: #7048e8;
  --pink: #e64980;
  --teal: #0c8599;
  --expo: #7048e8;
  --expo-light: #f3f0ff;
  --examen: #e03131;
  --examen-light: #fff0f0;
  --r: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.screen {
  display: none;
  min-height: 100vh;
  flex-direction: column;
  animation: slideIn 0.25s ease;
}
.screen.active { display: flex; }
@keyframes slideIn {
  from { opacity: 0; transform: translateX(18px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slideBack {
  from { opacity: 0; transform: translateX(-18px); }
  to   { opacity: 1; transform: translateX(0); }
}
.screen.back { animation: slideBack 0.25s ease; }

.topbar {
  background: var(--paper);
  border-bottom: 2px solid var(--line);
  padding: 0.9rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: var(--shadow);
}

.back-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.3rem;
  color: var(--accent);
  padding: 0.2rem;
  line-height: 1;
  flex-shrink: 0;
}

.topbar-title {
  font-family: 'Caveat', cursive;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--ink);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.topbar-action {
  background: none;
  border: 2px solid var(--accent);
  color: var(--accent);
  font-family: 'Nunito', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 0.35rem 0.8rem;
  border-radius: 100px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  display: none;
}
.topbar-action:hover, .topbar-action.active {
  background: var(--accent);
  color: white;
}
body.admin-mode .topbar-action { display: block; }

/* ── HOME ── */
#screen-home { background: var(--bg); }

.home-header {
  background: var(--paper);
  border-bottom: 2px solid var(--line);
  padding: 1.5rem 1.2rem 1.2rem;
  box-shadow: var(--shadow);
}

.home-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.8rem;
}

.home-title {
  font-family: 'Caveat', cursive;
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
}
.home-title span { color: var(--accent); }

.admin-btn-home {
  background: none;
  border: 2px solid var(--line);
  color: var(--muted);
  font-family: 'Nunito', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 0.3rem 0.7rem;
  border-radius: 100px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.admin-btn-home:hover, .admin-btn-home.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

.home-date {
  font-size: 0.75rem;
  color: var(--muted);
  font-style: italic;
}

.home-stats {
  display: flex;
  gap: 0.6rem;
  overflow-x: auto;
  padding-bottom: 0.2rem;
  flex-wrap: wrap;
}

.stat-pill {
  background: var(--paper2);
  border: 1.5px solid var(--line);
  border-radius: 100px;
  padding: 0.3rem 0.9rem;
  font-size: 0.7rem;
  color: var(--ink2);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  flex-shrink: 0;
}
.stat-pill strong { color: var(--ink); font-weight: 700; }
.stat-pill.urgent { background: var(--red-light); border-color: #ffc9c9; color: var(--red); }
.stat-pill.urgent strong { color: var(--red); }
.stat-pill.expo { background: var(--expo-light); border-color: #d9d0ff; color: var(--expo); }
.stat-pill.expo strong { color: var(--expo); }
.stat-pill.examen { background: var(--examen-light); border-color: #ffc9c9; color: var(--examen); }
.stat-pill.examen strong { color: var(--examen); }
.clickable-pill { cursor: pointer; user-select: none; transition: filter 0.15s, transform 0.15s; }
.clickable-pill:hover { filter: brightness(0.93); transform: translateY(-1px); }
.clickable-pill:active { transform: translateY(0); }

.pill-dropdown {
  position: fixed;
  background: var(--paper);
  border: 2px solid var(--line);
  border-radius: 14px;
  box-shadow: var(--shadow-lg);
  z-index: 500;
  min-width: 250px;
  max-width: 320px;
  max-height: 60vh;
  overflow-y: auto;
  animation: dropIn 0.18s ease;
}
@keyframes dropIn {
  from { opacity: 0; transform: translateY(-6px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.pill-dropdown-header {
  padding: 0.7rem 1rem 0.55rem;
  font-family: 'Caveat', cursive;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--ink2);
  border-bottom: 1.5px solid var(--line);
  position: sticky;
  top: 0;
  background: var(--paper);
}
.pill-dropdown-item {
  display: flex;
  align-items: center;
  gap: 0.65rem;
  padding: 0.65rem 1rem;
  cursor: pointer;
  transition: background 0.15s;
  border-bottom: 1px solid var(--line);
}
.pill-dropdown-item:last-child { border-bottom: none; }
.pill-dropdown-item:hover { background: var(--accent-light); }
.pill-dropdown-item-name {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--ink);
  flex: 1;
  line-height: 1.3;
}
.pill-dropdown-item-meta {
  font-size: 0.63rem;
  color: var(--muted);
  margin-top: 0.1rem;
}
.pill-dropdown-item-date {
  font-size: 0.63rem;
  color: var(--accent);
  margin-top: 0.1rem;
  font-weight: 600;
}
#pill-dropdown-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 499;
}

/* ── BANNER ── */
.home-banner {
  margin: 1.2rem 1.2rem 0;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  border: 2px solid var(--line);
  box-shadow: var(--shadow);
  flex-shrink: 0;
}
.home-banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.home-banner-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(26,26,46,0.6) 0%, rgba(26,26,46,0.15) 100%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0.9rem 1.1rem;
  gap: 0.35rem;
}
.home-banner-text {
  font-family: 'Caveat', cursive;
  font-size: 1.2rem;
  font-weight: 700;
  color: white;
  text-shadow: 0 1px 6px rgba(0,0,0,0.4);
  line-height: 1.3;
}
.home-banner-text.sub {
  font-size: 0.82rem;
  font-weight: 400;
  opacity: 0.9;
  font-family: 'Nunito', sans-serif;
}
/* today multi */
.banner-today-list {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
  max-height: 140px;
  overflow-y: auto;
}
.banner-today-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 0.3rem 0.6rem;
  backdrop-filter: blur(2px);
  transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
  cursor: pointer;
}
.banner-today-item:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  background: rgba(255,255,255,0.25);
}
.banner-today-item-name {
  font-family: 'Caveat', cursive;
  font-size: 0.95rem;
  font-weight: 700;
  color: white;
  flex: 1;
  text-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.banner-today-item-course {
  font-size: 0.65rem;
  color: rgba(255,255,255,0.75);
  white-space: nowrap;
}
.banner-img-wrapper {
  position: relative;
  height: 100px;
}
.banner-img-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.home-banner.no-tasks { min-height: 120px; }
.home-banner.no-tasks .home-banner-overlay {
  background: none;
  position: relative;
  inset: auto;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0.4rem;
  padding: 2rem 1rem;
}
.home-banner.no-tasks .home-banner-text {
  color: var(--green);
  text-shadow: none;
  font-size: 1.3rem;
  text-align: center;
}

/* ── TICKER ── */
.ticker-wrap {
  background: linear-gradient(135deg, #1864ab, #3b5bdb);
  border-radius: 12px;
  margin: 1.1rem 1.2rem 0;
  padding: 0;
  display: flex;
  align-items: stretch;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(59,91,219,0.15);
  min-height: 80px;
}
.ticker-label {
  font-size: 0.65rem;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  white-space: nowrap;
  background: rgba(255,255,255,0.15);
  padding: 0 0.9rem;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  border-right: 1px solid rgba(255,255,255,0.15);
}
.ticker-track {
  overflow: hidden;
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
}
.ticker-inner {
  display: flex;
  gap: 0;
  animation: ticker-scroll 22s linear infinite;
  white-space: nowrap;
  align-items: center;
}
.ticker-inner:hover { animation-play-state: paused; }

.ticker-item {
  display: inline-flex;
  flex-direction: column;
  justify-content: center;
  padding: 0.6rem 1.2rem;
  cursor: pointer;
  border-right: 1px solid rgba(255,255,255,0.12);
  transition: background 0.2s;
  min-width: 160px;
  flex-shrink: 0;
  vertical-align: middle;
  white-space: normal;
}
.ticker-item:hover { background: rgba(255,255,255,0.1); }

.ticker-task-name {
  font-size: 0.85rem;
  color: white;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 0.15rem;
}
.ticker-task-course {
  font-size: 0.7rem;
  color: rgba(255,255,255,0.7);
  font-weight: 400;
}
.ticker-task-days {
  font-size: 0.62rem;
  font-weight: 800;
  padding: 0.1rem 0.45rem;
  border-radius: 100px;
  display: inline-block;
  margin-top: 0.2rem;
  background: rgba(255,255,255,0.2);
  color: white;
}
.ticker-task-days.danger { background: rgba(255,100,100,0.4); }
.ticker-task-days.today  { background: rgba(255,60,60,0.7); animation: blink 1.4s infinite; }
.ticker-task-date {
  font-size: 0.6rem;
  color: rgba(255,255,255,0.6);
  margin-top: 0.1rem;
  display: block;
}

@keyframes ticker-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* ── COURSES LIST ── */
.courses-list {
  padding: 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
}

.course-card {
  background: var(--paper);
  border: 2px solid var(--line);
  border-radius: var(--r);
  overflow: hidden;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform 0.18s, box-shadow 0.18s;
  position: relative;
}
.course-card:hover, .course-card:active {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.course-card-accent {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 5px;
}

.course-card-inner {
  padding: 1rem 1rem 0.9rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.course-icon {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}

.course-info { flex: 1; min-width: 0; }

.course-card-name {
  font-family: 'Caveat', cursive;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 0.25rem;
}

.course-card-sub {
  font-size: 0.7rem;
  color: var(--muted);
}

.course-card-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.3rem;
  flex-shrink: 0;
}

.task-badge {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 0.2rem 0.6rem;
  border-radius: 100px;
}
.task-badge.none { background: var(--paper2); color: var(--muted); }
.task-badge.ok { background: var(--green-light); color: var(--green); }
.task-badge.warn { background: var(--orange-light); color: var(--orange); }
.task-badge.urgent { background: var(--red-light); color: var(--red); }

.chevron { color: var(--muted); font-size: 1rem; }

/* ── COURSE SCREEN ── */
#screen-course { background: var(--bg); }

.course-hero {
  padding: 1.4rem 1.2rem 1.2rem;
  border-bottom: 2px solid var(--line);
  background: var(--paper);
}

.course-hero-name {
  font-family: 'Caveat', cursive;
  font-size: 2rem;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 0.4rem;
}

.course-hero-sub {
  font-size: 0.72rem;
  color: var(--muted);
}

.tasks-section { padding: 1.2rem; }

.section-title {
  font-family: 'Caveat', cursive;
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--ink2);
  margin-bottom: 0.8rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1.5px;
  background: var(--line);
}

/* ── TASK CARD ── */
.task-card {
  background: var(--paper);
  border: 2px solid var(--line);
  border-radius: var(--r);
  padding: 0.9rem 1rem;
  margin-bottom: 0.7rem;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform 0.18s, box-shadow 0.18s;
  display: flex;
  align-items: center;
  gap: 0.8rem;
  position: relative;
  overflow: hidden;
}
.task-card:hover, .task-card:active {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}
.task-card.urgent { border-color: #ffc9c9; background: #fffafa; }
.task-card.warn { border-color: #ffe8c0; background: #fffdf7; }

.task-card-stripe {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
}

.task-card-body { flex: 1; min-width: 0; }

.task-card-name {
  font-weight: 700;
  font-size: 0.9rem;
  margin-bottom: 0.3rem;
  color: var(--ink);
  line-height: 1.3;
}

.task-card-meta {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  flex-wrap: wrap;
}

.task-date-tag {
  font-size: 0.65rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 0.2rem;
}

.days-tag {
  font-size: 0.62rem;
  font-weight: 700;
  padding: 0.15rem 0.55rem;
  border-radius: 100px;
}
.days-ok { background: var(--green-light); color: var(--green); }
.days-warn { background: var(--orange-light); color: var(--orange); }
.days-danger { background: var(--red-light); color: var(--red); }
.days-today { background: var(--red); color: white; animation: blink 1.4s infinite; }

.has-pdf-tag {
  font-size: 0.6rem;
  color: var(--accent);
  background: var(--accent-light);
  padding: 0.15rem 0.5rem;
  border-radius: 100px;
}

.cat-tag-tarea {
  font-size: 0.6rem;
  color: var(--teal);
  background: #e3fafc;
  padding: 0.15rem 0.5rem;
  border-radius: 100px;
  font-weight: 700;
}
.cat-tag-exposicion {
  font-size: 0.6rem;
  color: var(--expo);
  background: var(--expo-light);
  padding: 0.15rem 0.5rem;
  border-radius: 100px;
  font-weight: 700;
}
.cat-tag-examen {
  font-size: 0.6rem;
  color: var(--examen);
  background: var(--examen-light);
  padding: 0.15rem 0.5rem;
  border-radius: 100px;
  font-weight: 700;
}

/* Admin actions on task card */
.task-card-actions {
  display: none;
  flex-direction: column;
  gap: 0.3rem;
  flex-shrink: 0;
  align-items: flex-end;
}
body.admin-mode .task-card-actions { display: flex; }

.task-edit-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.85rem;
  padding: 0.3rem;
  border-radius: 8px;
  transition: all 0.2s;
}
.task-edit-btn:hover { color: var(--accent); background: var(--accent-light); }

.task-delete-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.85rem;
  padding: 0.3rem;
  border-radius: 8px;
  transition: all 0.2s;
}
.task-delete-btn:hover { color: var(--red); background: var(--red-light); }

/* non-admin chevron */
.task-chevron {
  color: var(--muted);
  font-size: 1rem;
  flex-shrink: 0;
}
body.admin-mode .task-chevron { display: none; }

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--muted);
}
.empty-state .emoji { font-size: 2.5rem; margin-bottom: 0.7rem; }
.empty-state p { font-family: 'Caveat', cursive; font-size: 1.1rem; }

.add-task-btn {
  width: 100%;
  background: var(--accent-light);
  border: 2px dashed var(--accent);
  color: var(--accent);
  font-family: 'Nunito', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  padding: 0.8rem;
  border-radius: var(--r);
  cursor: pointer;
  transition: all 0.2s;
  display: none;
  margin-top: 0.3rem;
}
.add-task-btn:hover { background: var(--accent); color: white; }
body.admin-mode .add-task-btn { display: block; }

/* ── TASK DETAIL ── */
#screen-task { background: var(--bg); }

.task-hero {
  background: var(--paper);
  border-bottom: 2px solid var(--line);
  padding: 1.2rem 1.2rem 1rem;
}

.task-hero-name {
  font-family: 'Caveat', cursive;
  font-size: 1.8rem;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 0.6rem;
}

.task-hero-meta {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  align-items: center;
}

.task-blocks {
  padding: 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.block {
  background: var(--paper);
  border: 2px solid var(--line);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.block-header {
  padding: 0.8rem 1rem;
  border-bottom: 1.5px solid var(--line);
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.block-icon {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
  flex-shrink: 0;
}

.block-title {
  font-family: 'Caveat', cursive;
  font-size: 1.1rem;
  font-weight: 700;
  flex: 1;
}

.block-body { padding: 1rem; }

.pdf-item {

    headers: SB_HEADERS,

      id: task.id,

  const map = {};
  COURSES.forEach(c => map[c.id] = []);
  rows.forEach(r => {
    if (!map[r.course_id]) map[r.course_id] = [];
    map[r.course_id].push({
      id: r.id,
      name: r.name,
      deadline: r.deadline,
      description: r.description || '',
      pdfs: r.pdfs || { teoria:[], tarea:[], adjuntos:[] },
      categoria: r.categoria || 'tarea',
    });
  });
  return map;
}

async function autoDelete(rows) {
  const today = new Date(); today.setHours(0,0,0,0);
  const toDelete = rows.filter(r => {
    const dl = new Date(r.deadline + 'T00:00:00');
    return Math.floor((today - dl) / 86400000) > 0;
  });
  for (const r of toDelete) {
    try { await dbDeleteTask(r.id); } catch(e) {}
  }
  return rows.filter(r => {
    const dl = new Date(r.deadline + 'T00:00:00');
    return Math.floor((today - dl) / 86400000) <= 0;
  });
}

function daysLeft(dl) {
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.floor((new Date(dl+'T00:00:00') - today) / 86400000);
}

function daysChip(d) {
  if (d < 0)   return `<span class="days-tag days-danger">vencida</span>`;
  if (d === 0) return `<span class="days-tag days-today">¡hoy!</span>`;
  if (d === 1) return `<span class="days-tag days-danger">1 día</span>`;
  if (d <= 3)  return `<span class="days-tag days-warn">${d} días</span>`;
  return `<span class="days-tag days-ok">${d} días</span>`;
}

function urgencyBadge(courseTasks) {
  if (!courseTasks.length) return '<span class="task-badge none">sin tareas</span>';
  const min = Math.min(...courseTasks.map(t => daysLeft(t.deadline)));
  const n = courseTasks.length;
  if (min <= 1)  return `<span class="task-badge urgent">⚠ ${n} tarea${n!==1?'s':''}</span>`;
  if (min <= 3)  return `<span class="task-badge warn">🕐 ${n} tarea${n!==1?'s':''}</span>`;
  return `<span class="task-badge ok">✓ ${n} tarea${n!==1?'s':''}</span>`;
}

function fmtDate(iso) {
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function fmtDateFull(iso) {
  const date = new Date(iso + 'T00:00:00');
  const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${dias[date.getDay()]} ${date.getDate()} ${meses[date.getMonth()]}`;
}

function hasPdfs(task) {
  return (task.pdfs.teoria.length + task.pdfs.tarea.length + task.pdfs.adjuntos.length) > 0;
}

  if (cat === 'exposicion') return '🎤';
  if (cat === 'examen')     return '📝';

function togglePillDropdown(e, type) {
  e.stopPropagation();
  const existing = document.getElementById('pill-dropdown');
  if (existing && existing.dataset.type === type) { closePillDropdown(); return; }
  closePillDropdown();

  const allTasks = window._pillAllTasks || [];
  let filtered, title;

  if (type === 'tarea') {
    filtered = allTasks.filter(t => (t.categoria || 'tarea') === 'tarea');
    title = '📋 Tareas';
  } else if (type === 'exposicion') {
    filtered = allTasks.filter(t => t.categoria === 'exposicion');
    title = '🎤 Exposiciones';
  } else if (type === 'examen') {
    filtered = allTasks.filter(t => t.categoria === 'examen');
    title = '📝 Exámenes';
  } else if (type === 'urgent') {
    filtered = allTasks.filter(t => daysLeft(t.deadline) <= 1);
    title = '⚠ Urgentes';
  } else return;

  filtered = filtered.slice().sort((a,b) => new Date(a.deadline)-new Date(b.deadline));
  if (!filtered.length) return;

  const itemsHTML = filtered.map(t => {
    const d = daysLeft(t.deadline);
    return '<div class="pill-dropdown-item" onclick="closePillDropdown();openTaskFromTicker(\'' + t.courseId + '\',' + t.id + ')">' +
      '<span style="font-size:1.1rem;flex-shrink:0">' + catIcon(t.categoria) + '</span>' +
      '<div style="flex:1;min-width:0">' +
        '<div class="pill-dropdown-item-name">' + t.name + '</div>' +
        '<div class="pill-dropdown-item-meta">' + t.courseIcon + ' ' + t.courseName + '</div>' +
        '<div class="pill-dropdown-item-date">📅 ' + fmtDateFull(t.deadline) + ' · ' + fmtDate(t.deadline) + '</div>' +
      '</div>' +
      '<div style="flex-shrink:0">' + daysChip(d) + '</div>' +
    '</div>';
  }).join('');

  const dropdown = document.createElement('div');
  dropdown.id = 'pill-dropdown';
  dropdown.className = 'pill-dropdown';
  dropdown.dataset.type = type;
  dropdown.innerHTML = '<div class="pill-dropdown-header">' + title + ' <span style="color:var(--muted);font-weight:400;font-size:0.85rem">(' + filtered.length + ')</span></div>' + itemsHTML;
  document.body.appendChild(dropdown);

  const rect = e.currentTarget.getBoundingClientRect();
  let top  = rect.bottom + 6;
  let left = rect.left;
  dropdown.style.top  = top + 'px';
  dropdown.style.left = left + 'px';

  requestAnimationFrame(function() {
    const dw = dropdown.offsetWidth;
    const dh = dropdown.offsetHeight;
    if (left + dw > window.innerWidth - 8)  dropdown.style.left = (window.innerWidth - dw - 8) + 'px';
    if (top  + dh > window.innerHeight - 8) dropdown.style.top  = (rect.top - dh - 6) + 'px';
  });

  document.getElementById('pill-dropdown-overlay').style.display = 'block';
}

function closePillDropdown() {
  const el = document.getElementById('pill-dropdown');
  if (el) el.remove();
  document.getElementById('pill-dropdown-overlay').style.display = 'none';
}

function openCourse(cid) {
  activeCourseId = cid;
  renderCourse(cid);
  showScreen('course');
}

function renderCourse(cid) {
  const c  = COURSES.find(x => x.id === cid);
  const all = (tasks[cid] || []).slice().sort((a,b) => new Date(a.deadline)-new Date(b.deadline));
  const tareas = all.filter(t => (t.categoria||'tarea') === 'tarea');
  const expos  = all.filter(t => (t.categoria||'tarea') === 'exposicion');
  const exams  = all.filter(t => (t.categoria||'tarea') === 'examen');

  document.getElementById('course-topbar-title').textContent = c.name;
  document.getElementById('course-hero-name').textContent = c.icon + ' ' + c.name;

  const parts = [];
  if (tareas.length) parts.push(`${tareas.length} tarea${tareas.length!==1?'s':''}`);
  if (expos.length)  parts.push(`${expos.length} exposición${expos.length!==1?'es':''}`);
  if (exams.length)  parts.push(`${exams.length} examen${exams.length!==1?'es':''}`);
  document.getElementById('course-hero-sub').textContent = parts.length ? parts.join(' · ') + ' pendiente' + (all.length!==1?'s':'') : 'Sin tareas pendientes';

  const list = document.getElementById('tasks-list');
  if (!all.length) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">🎉</div><p>¡Todo al día!</p></div>`;
    return;
  }

  let html = '';
  if (tareas.length) {
    html += `<div class="section-title">📋 tareas</div>`;
    html += tareas.map(t => taskCardHTML(t, cid, c)).join('');
  }
  if (expos.length) {
    html += `<div class="section-title" style="margin-top:${tareas.length?'1rem':'0'}">🎤 exposiciones</div>`;
    html += expos.map(t => taskCardHTML(t, cid, c)).join('');
  }
  if (exams.length) {
    html += `<div class="section-title" style="margin-top:${(tareas.length||expos.length)?'1rem':'0'}">📝 exámenes</div>`;
    html += exams.map(t => taskCardHTML(t, cid, c)).join('');
  }

  list.innerHTML = html;
}

function taskCardHTML(t, cid, c) {
  const d      = daysLeft(t.deadline);
  const cls    = d <= 1 ? 'urgent' : d <= 3 ? 'warn' : '';
  const stripe = d <= 1 ? '#ff6b6b' : d <= 3 ? '#ffb347' : c.color;
  const pdftag = hasPdfs(t) ? '<span class="has-pdf-tag">📎 Archivos</span>' : '';
  return `<div class="task-card ${cls}" onclick="openTask('${cid}',${t.id})">
    <div class="task-card-stripe" style="background:${stripe}"></div>
    <div class="task-card-body">
      <div class="task-card-name">${t.name}</div>
      <div class="task-card-meta">
        <span class="task-date-tag">📅 ${fmtDate(t.deadline)}</span>
        ${daysChip(d)}
        ${catTagHTML(t.categoria)}
        ${pdftag}
      </div>
    </div>
    <div class="task-card-actions">
      <button class="task-edit-btn" onclick="editTask(event,'${cid}',${t.id})">✏️</button>
      <button class="task-delete-btn" onclick="deleteTask(event,'${cid}',${t.id})">🗑</button>
    </div>
    <span class="task-chevron">›</span>
  </div>`;
}

async function saveTaskPersonalBlock(cid, tid) {

  const entregado = document.getElementById('tpb-entregado').checked;
  _personalStates[tid] = { hecho, entregado };

    await savePersonalStateToDb(tid, hecho, entregado);
  } catch(e) { console.warn('Error guardando', e); }
}
function openTask(cid, tid, fromPersonal = false) {
  activeCourseId = cid;
  activeTaskId   = tid;
  _taskOpenedFromPersonal = fromPersonal;
  const task = tasks[cid].find(t => t.id === tid);
  if (!task) return;
  const c = COURSES.find(x => x.id === cid);
  const d = daysLeft(task.deadline);

  // Botón volver: si viene de personal vuelve al home, sino al curso
  const backBtn = document.getElementById('task-back-btn');
  backBtn.onclick = fromPersonal ? () => goBack('home') : () => goBack('course');

  // Bloque personal
  renderTaskPersonalBlock(cid, tid);

  document.getElementById('task-topbar-title').textContent = task.name;
  document.getElementById('task-hero-name').textContent    = task.name;
  document.getElementById('task-hero-meta').innerHTML = `
    <span class="task-date-tag" style="font-size:0.75rem">📅 ${fmtDate(task.deadline)}</span>
    ${daysChip(d)}
    ${catTagHTML(task.categoria)}
    <span style="font-size:0.72rem;color:var(--muted)">${c.icon} ${c.name}</span>
  `;

  const desc = task.description || '';
  document.getElementById('desc-text').textContent = desc || 'Sin descripción.';
  document.getElementById('desc-text').classList.toggle('empty', !desc);
  document.getElementById('desc-textarea').value = desc;

  const saveBtn = document.getElementById('desc-save-btn');
  saveBtn.textContent = '💾 Guardar descripción';
  saveBtn.style.background = '';
  saveBtn.disabled = false;

  renderFileBlock('teoria',   task);
  renderFileBlock('tarea',    task);

    const el = document.getElementById('input-'+k);
    if (el) el.value = '';
    const fn = document.getElementById('fname-'+k);
    if (fn) fn.textContent = 'Ningún archivo elegido';
    const btn = document.getElementById('btn-'+k);
    if (btn) btn.disabled = true;

}

async function saveDescription() {
  const task = tasks[activeCourseId].find(t => t.id === activeTaskId);
  const desc = document.getElementById('desc-textarea').value.trim();
  const btn  = document.getElementById('desc-save-btn');

  btn.textContent = '⏳ Guardando...';
  btn.disabled = true;

  try {
    await dbUpdateTask(activeTaskId, { description: desc });
    task.description = desc;
    document.getElementById('desc-text').textContent = desc || 'Sin descripción.';
    document.getElementById('desc-text').classList.toggle('empty', !desc);
    btn.textContent = '✓ Guardado';
    btn.style.background = '#2f9e44';
    setTimeout(() => {
      btn.textContent = '💾 Guardar descripción';
      btn.style.background = '';
    }, 2000);
  } catch(e) {
    alert('Error al guardar: ' + e.message);
    btn.textContent = '💾 Guardar descripción';
  } finally {
    btn.disabled = false;
  }
}

function renderFileBlock(type, task) {
  const list = document.getElementById('block-'+type+'-list');
  const files = task.pdfs[type] || [];
  if (!files.length) {
    list.innerHTML = `<div class="block-empty">Sin archivos aún</div>`;
    return;
  }
  list.innerHTML = files.map((file, i) => {
    const url  = publicUrl(file);
    const raw  = file.split('/').pop();
    const name = raw.replace(/^\d+-/, ''); // ← saca el timestamp del principio
    const icon = getFileIcon(file);
    const type_ = getFileType(file);
    const isPptx = file.toLowerCase().endsWith('.pptx');
    const viewUrl = isPptx ? `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=false` : url;
    return `
    <div class="pdf-item">
      <div class="pdf-item-icon">${icon}</div>
      <div class="pdf-item-info">
        <div class="pdf-item-name">${name}</div>
        <div class="pdf-item-sub">${type_}</div>
      </div>
      <div class="pdf-item-actions">
        <a class="pdf-btn" href="${viewUrl}" target="_blank">👁 Ver</a>
        <a class="pdf-btn download" href="${url}" download="${name}">⬇ Descargar</a>
        <button class="delete-pdf-btn" onclick="deleteFile(event,'${type}',${i})">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
function onFileChosen(type) {
  const input = document.getElementById('input-'+type);
  const fname = document.getElementById('fname-'+type);
  const btn   = document.getElementById('btn-'+type);
  if (input.files && input.files[0]) {
    fname.textContent = input.files[0].name;
    btn.disabled = false;
  } else {
    fname.textContent = 'Ningún archivo elegido';
    btn.disabled = true;
  }
}

function getMimeType(file) {
  if (file.name.toLowerCase().endsWith('.pptx')) {
    return 'application/vnd.openxmlformats-officedocument.presentationml.presentation';
  }
  return file.type || 'application/pdf';
}

async function uploadFile(type) {
  const input   = document.getElementById('input-'+type);
  const btn     = document.getElementById('btn-'+type);
  const prog    = document.getElementById('prog-'+type);
  const progbar = document.getElementById('progbar-'+type);
  const file    = input.files[0];
  if (!file) return;

  const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  const path = `${activeCourseId}/${activeTaskId}/${type}/${Date.now()}-${safeName}`;
  const mime = getMimeType(file);

  btn.disabled = true;
  btn.textContent = '⏳ Subiendo...';
  prog.classList.add('show');
  progbar.style.width = '30%';

  try {
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${SUPABASE_ANON}`,
        'Content-Type': mime,
        'x-upsert': 'true',
      },
      body: file,
    });

    progbar.style.width = '70%';
    if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(err.message || `Error ${res.status}`); }

    const task = tasks[activeCourseId].find(t => t.id === activeTaskId);
    if (!task.pdfs[type]) task.pdfs[type] = [];
    task.pdfs[type].push(path);

    await dbUpdateTask(activeTaskId, { pdfs: task.pdfs });
    progbar.style.width = '100%';

    renderFileBlock(type, task);
    renderCourse(activeCourseId);

    input.value = '';
    document.getElementById('fname-'+type).textContent = 'Ningún archivo elegido';
    btn.textContent = '⬆ Subir';
    btn.disabled = true;
    setTimeout(() => { prog.classList.remove('show'); progbar.style.width = '0%'; }, 800);

  } catch(e) {
    alert('Error al subir: ' + e.message);
    btn.disabled = false;
    btn.textContent = '⬆ Subir';
    prog.classList.remove('show');
    progbar.style.width = '0%';
  }
}

async function deleteFile(e, type, idx) {
  e.preventDefault(); e.stopPropagation();
  const task = tasks[activeCourseId].find(t => t.id === activeTaskId);
  const path = task.pdfs[type][idx];

  try {
    await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${SUPABASE_ANON}` },
    });
  } catch(e) {}

  task.pdfs[type].splice(idx, 1);
  await dbUpdateTask(activeTaskId, { pdfs: task.pdfs }).catch(()=>{});
  renderFileBlock(type, task);
  renderCourse(activeCourseId);
}

let selectedCat = 'tarea';

function selectCat(cat) {
  selectedCat = cat;
  document.getElementById('lbl-tarea').className     = 'cat-radio-label' + (cat === 'tarea'      ? ' selected-tarea'      : '');
  document.getElementById('lbl-exposicion').className= 'cat-radio-label' + (cat === 'exposicion' ? ' selected-exposicion' : '');
  document.getElementById('lbl-examen').className    = 'cat-radio-label' + (cat === 'examen'     ? ' selected-examen'     : '');
}

function openAddModal() {
  editingTaskId = null;
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('f-name').value = '';
  document.getElementById('f-date').value = today;
  selectedCat = 'tarea';
  selectCat('tarea');
  document.getElementById('modal-title-text').textContent = '✏️ nueva tarea';

  document.getElementById('add-modal').classList.add('open');

}

function editTask(e, cid, tid) {
  e.stopPropagation();
  editingTaskId = tid;
  const task = tasks[cid].find(t => t.id === tid);
  if (!task) return;

  document.getElementById('f-name').value = task.name;
  document.getElementById('f-date').value = task.deadline;

  selectCat(selectedCat);
  document.getElementById('modal-title-text').textContent = '✏️ editar tarea';
  document.getElementById('modal-save-btn').textContent = 'Actualizar';
  document.getElementById('add-modal').classList.add('open');

}

function closeAddModal(e) {
  if (e.target === document.getElementById('add-modal')) closeAddModalDirect();
}
function closeAddModalDirect() {
  document.getElementById('add-modal').classList.remove('open');
  editingTaskId = null;
}

async function saveTask() {
  const name = document.getElementById('f-name').value.trim();
  const date = document.getElementById('f-date').value;
  if (!name || !date) { alert('Completá nombre y fecha.'); return; }

  const btn = document.getElementById('modal-save-btn');
  btn.textContent = 'Guardando...';
  btn.disabled = true;

  try {
    if (editingTaskId !== null) {
      // ── UPDATE ──
      await dbUpdateTask(editingTaskId, { name, deadline: date, categoria: selectedCat });
      const task = tasks[activeCourseId].find(t => t.id === editingTaskId);
      task.name      = name;
      task.deadline  = date;
      task.categoria = selectedCat;
      closeAddModalDirect();
      renderCourse(activeCourseId);
      renderHome();
    } else {
      // ── INSERT ──
      const newTask = {
        id: Date.now(),
        course_id: activeCourseId,
        name,
        deadline: date,
        description: '',
        pdfs: { teoria:[], tarea:[], adjuntos:[] },
        categoria: selectedCat,
      };
      await dbInsertTask(newTask);
      if (!tasks[activeCourseId]) tasks[activeCourseId] = [];
      tasks[activeCourseId].push({ id: newTask.id, name, deadline: date, description: '', pdfs: newTask.pdfs, categoria: selectedCat });
      closeAddModalDirect();
      renderCourse(activeCourseId);
      renderHome();
    }
  } catch(e) {
    alert('Error: ' + e.message);
  } finally {
    btn.textContent = editingTaskId ? 'Actualizar' : 'Guardar';
    btn.disabled = false;
  }
}

async function deleteTask(e, cid, tid) {
  e.stopPropagation();
  if (!confirm('¿Eliminar esta tarea?')) return;
  try {
    await dbDeleteTask(tid);
    tasks[cid] = tasks[cid].filter(t => t.id !== tid);
    renderCourse(cid);
    renderHome();
  } catch(e) {
    alert('Error al eliminar: ' + e.message);
  }
}

// ═══════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════
function openPwModal() {
  if (isAdmin) { disableAdmin(); return; }
  document.getElementById('pw-modal').classList.add('open');
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}

function closePwModal() {
  document.getElementById('pw-modal').classList.remove('open');
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').classList.remove('show');
}

function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === ADMIN_PASSWORD) {
    isAdmin = true;
    document.body.classList.add('admin-mode');
    document.getElementById('admin-btn').classList.add('active');
    document.getElementById('admin-btn').textContent = '✓ admin';
    closePwModal();
  } else {
    document.getElementById('pw-error').classList.add('show');
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function disableAdmin() {
  isAdmin = false;
  document.body.classList.remove('admin-mode');
  document.getElementById('admin-btn').classList.remove('active');
  document.getElementById('admin-btn').textContent = '⚙ admin';
}

// ═══════════════════════════════════════════
// PERSONAL — USUARIOS Y ESTADO (Supabase)
// ═══════════════════════════════════════════
// ═══════════════════════════════════════════
// PERSONAL — USUARIOS Y ESTADO (Supabase)
// ═══════════════════════════════════════════
let currentUser = null;
let _personalModalCid = null;
let _personalModalTid = null;
let _personalStates = {};
let _loginMode = 'login'; // 'login' | 'register'

function loadCurrentUser() {
  try { currentUser = JSON.parse(localStorage.getItem('personal_user')) || null; } catch(e) { currentUser = null; }
}

async function loginPersonal() {
  const u = document.getElementById('personal-login-user').value.trim().toLowerCase();
  const p = document.getElementById('personal-login-pass').value;
  const errEl = document.getElementById('personal-login-err');
  if (!u || !p) { errEl.textContent = 'Completá todos los campos ✗'; errEl.classList.add('show'); return; }

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/users?username=eq.${encodeURIComponent(u)}&password=eq.${encodeURIComponent(p)}&select=username,display_name`,
      { headers: SB_HEADERS }
    );
    const rows = await res.json();
    if (!rows.length) {
      errEl.textContent = 'Usuario o contraseña incorrectos ✗';
      errEl.classList.add('show');
      document.getElementById('personal-login-pass').value = '';
      return;
    }
    errEl.classList.remove('show');
    currentUser = { username: rows[0].username, displayName: rows[0].display_name };
    localStorage.setItem('personal_user', JSON.stringify(currentUser));
    await loadPersonalStates();
    renderPersonalSection();
  } catch(e) {
    errEl.textContent = 'Error de conexión ✗';
    errEl.classList.add('show');
  }
}

async function registerPersonal() {
  const u    = document.getElementById('personal-login-user').value.trim().toLowerCase();
  const p    = document.getElementById('personal-login-pass').value;
  const name = document.getElementById('personal-login-name').value.trim();
  const errEl = document.getElementById('personal-login-err');
  if (!u || !p || !name) { errEl.textContent = 'Completá todos los campos ✗'; errEl.classList.add('show'); return; }
  if (u.length < 3)      { errEl.textContent = 'El usuario debe tener al menos 3 caracteres ✗'; errEl.classList.add('show'); return; }
  if (p.length < 4)      { errEl.textContent = 'La contraseña debe tener al menos 4 caracteres ✗'; errEl.classList.add('show'); return; }

  try {
    // Verificar si ya existe
    const check = await fetch(
      `${SUPABASE_URL}/rest/v1/users?username=eq.${encodeURIComponent(u)}&select=username`,
      { headers: SB_HEADERS }
    );
    const existing = await check.json();
    if (existing.length) {
      errEl.textContent = 'Ese usuario ya existe ✗';
      errEl.classList.add('show');
      return;
    }

    // Crear usuario
    const res = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
      method: 'POST',
      headers: { ...SB_HEADERS, 'Prefer': 'return=representation' },
      body: JSON.stringify({ username: u, password: p, display_name: name }),
    });
    if (!res.ok) throw new Error();

    errEl.classList.remove('show');
    currentUser = { username: u, displayName: name };
    localStorage.setItem('personal_user', JSON.stringify(currentUser));
    await loadPersonalStates();
    renderPersonalSection();
  } catch(e) {
    errEl.textContent = 'Error al crear cuenta ✗';
    errEl.classList.add('show');
  }
}

function toggleLoginMode() {
  _loginMode = _loginMode === 'login' ? 'register' : 'login';
  renderPersonalSection();
}

function logoutUser() {
  currentUser = null;
  _personalStates = {};
  localStorage.removeItem('personal_user');
  renderPersonalSection();
}

async function loadPersonalStates() {
  if (!currentUser) return;
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/user_task_status?username=eq.${encodeURIComponent(currentUser.username)}&select=task_id,hecho,entregado`,
      { headers: SB_HEADERS }
    );
    if (!res.ok) return;
    const rows = await res.json();
    _personalStates = {};
    rows.forEach(r => { _personalStates[r.task_id] = { hecho: r.hecho, entregado: r.entregado }; });
  } catch(e) { console.warn('No se pudieron cargar estados personales', e); }
}

async function savePersonalStateToDb(taskId, hecho, entregado) {
  await fetch(`${SUPABASE_URL}/rest/v1/user_task_status`, {
    method: 'POST',
    headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify({ username: currentUser.username, task_id: taskId, hecho, entregado }),
  });
}

function renderPersonalSection() {
  const container = document.getElementById('personal-section-container');
  if (!container) return;

  if (!currentUser) {
   const isReg = _loginMode === 'register';
    container.innerHTML = `
      <div class="personal-login-box">
        <div class="personal-login-title">${isReg ? '📝 Crear cuenta' : '👤 Mi sección personal'}</div>
        <div class="personal-login-sub">${isReg ? 'Creá tu cuenta gratuita. Tus datos se guardan en la nube.' : 'Ingresá para ver tu progreso personalizado. Se guarda en la nube — funciona en cualquier dispositivo.'}</div>
        <div class="personal-login-row">
          ${isReg ? `<input class="personal-login-input" id="personal-login-name" type="text" placeholder="tu nombre completo" onkeydown="if(event.key==='Enter')registerPersonal()">` : ''}
          <input class="personal-login-input" id="personal-login-user" type="text" placeholder="usuario"
            onkeydown="if(event.key==='Enter')${isReg ? 'registerPersonal' : 'loginPersonal'}()">
          <input class="personal-login-input" id="personal-login-pass" type="password" placeholder="contraseña"
            onkeydown="if(event.key==='Enter')${isReg ? 'registerPersonal' : 'loginPersonal'}()">
          <button class="personal-login-btn" onclick="${isReg ? 'registerPersonal' : 'loginPersonal'}()">${isReg ? 'Crear cuenta' : 'Entrar'}</button>
        </div>
        <div class="personal-login-err" id="personal-login-err"></div>
        <div class="personal-login-hint" style="cursor:pointer;color:var(--accent)" onclick="toggleLoginMode()">
          ${isReg ? '← Ya tengo cuenta, iniciar sesión' : '¿No tenés cuenta? Registrate gratis →'}
        </div>
      </div>`;
    return;
  }

  const allTasks = [];
  for (const cid in tasks) {
    (tasks[cid] || []).forEach(t => {
      const state = _personalStates[t.id] || { hecho: false, entregado: false };
      const done = state.hecho && state.entregado;
      const c = COURSES.find(x => x.id === cid);
      allTasks.push({ ...t, courseIcon: c ? c.icon : '📚', courseName: c ? c.name : cid, courseId: cid, color: c ? c.color : '#888', done, state });
    });
  }

  const pending = allTasks.filter(t => !t.done);
  const faltaMsg = pending.length === 0
    ? '🎉 ¡Todo hecho y entregado!'
    : `Te faltan <strong>${pending.length}</strong> tarea${pending.length !== 1 ? 's' : ''}`;

  const sorted = [...allTasks].sort((a, b) => new Date(a.deadline) - new Date(b.deadline));

 // ✅ CÓDIGO CORREGIDO
  const itemsHTML = sorted.length === 0
    ? `<div class="personal-empty">No hay tareas cargadas aún.</div>`
    : sorted.map(t => {
        const d = daysLeft(t.deadline);
        const hecho     = t.state.hecho;
        const entregado = t.state.entregado;
        const doneClass = t.done ? 'done' : '';
        const checkContent = t.done ? '✓' : '';
        let statusBadge = '';
        if (t.done) {
          statusBadge = `<span class="personal-done-badge">✅ Ya lo hiciste y entregaste</span>`;
        } else if (hecho && !entregado) {
          statusBadge = `<span class="personal-done-badge" style="color:#e67700;border-color:#e67700;background:#fff3e0">⚠️ TE FALTA ENTREGARLO</span>`;
        }
        return `<div class="personal-task-item ${doneClass}" onclick="openTask('${t.courseId}',${t.id},true)">
          <div class="personal-task-check">${checkContent}</div>
          <div class="personal-task-info">
            <div class="personal-task-name">${catIcon(t.categoria)} ${t.name}</div>
            <div class="personal-task-meta">
              ${t.courseIcon} ${t.courseName} · 📅 ${fmtDate(t.deadline)} · ${daysChip(d)}
              ${statusBadge}
            </div>
          </div>
        </div>`;
      }).join('');
// ✅ FIN DEL CAMBIO

  container.innerHTML = `
    <div class="personal-section">
      <div class="personal-header">
        <div class="personal-header-left">
          <div class="personal-label">📌 Personal</div>
          <div class="personal-username">👤 ${currentUser.displayName}</div>
          <div class="personal-falta">${faltaMsg}</div>
        </div>
        <button class="personal-logout-btn" onclick="logoutUser()">Salir</button>
      </div>
      <div class="personal-body">${itemsHTML}</div>
    </div>`;
}

function openPersonalTaskModal(cid, tid) {
  if (!currentUser) return;
  _personalModalCid = cid;
  _personalModalTid = tid;
  const task = (tasks[cid] || []).find(t => t.id === tid);
  if (!task) return;
  const c = COURSES.find(x => x.id === cid);
  const state = _personalStates[tid] || { hecho: false, entregado: false };

  document.getElementById('ptm-title').textContent = `${catIcon(task.categoria)} ${task.name}`;
  document.getElementById('ptm-sub').textContent = `${c ? c.icon + ' ' + c.name : cid} · 📅 ${fmtDate(task.deadline)}`;
  document.getElementById('ptm-rows').innerHTML = `
    <div class="personal-check-row">
      <div class="personal-check-label">✅ Ya lo hice</div>
      <label class="personal-toggle">
        <input type="checkbox" id="ptm-hecho" ${state.hecho ? 'checked' : ''} onchange="savePersonalState()">
        <div class="personal-toggle-slider"></div>
      </label>
    </div>
    <div class="personal-check-row">
      <div class="personal-check-label">📤 Ya lo entregué</div>
      <label class="personal-toggle">
        <input type="checkbox" id="ptm-entregado" ${state.entregado ? 'checked' : ''} onchange="savePersonalState()">
        <div class="personal-toggle-slider"></div>
      </label>
    </div>`;

  const modal = document.getElementById('personal-task-modal');
  modal.addEventListener('click', function handler(e) {
    if (e.target === modal) { closePersonalModal(); modal.removeEventListener('click', handler); }
  });
  requestAnimationFrame(() => modal.classList.add('open'));
}

function closePersonalModal() {
  document.getElementById('personal-task-modal').classList.remove('open');
}

// ✅ CÓDIGO CORREGIDO
async function savePersonalState() {
  if (!currentUser || _personalModalTid === null) return;
  const hecho     = document.getElementById('ptm-hecho').checked;
  const entregado = document.getElementById('ptm-entregado').checked;
  _personalStates[_personalModalTid] = { hecho, entregado };
  // Re-render WITHOUT closing modal so user can keep toggling
  // Solo actualizamos el DOM de la lista personal en background
  const container = document.getElementById('personal-section-container');
  // Guardamos referencia antes de re-render
  const tid = _personalModalTid;
  const cid = _personalModalCid;
  renderPersonalSection();
  // Restaurar referencia (renderPersonalSection la limpia)
  _personalModalTid = tid;
  _personalModalCid = cid;
  try {
    await savePersonalStateToDb(_personalModalTid, hecho, entregado);
  } catch(e) { console.warn('Error guardando estado', e); }
}
// ✅ FIN DEL CAMBIO

async function init() {
  loadCurrentUser();

  document.getElementById('courses-list').innerHTML = `
    <div class="empty-state" style="padding:2rem 0">
      <div class="emoji">⏳</div>
      <p>Cargando tareas...</p>
    </div>`;
  renderHome();

  try {
    let rows = await dbGetTasks();
    rows = await autoDelete(rows);
    tasks = buildTasksMap(rows);

    if (currentUser) {
      await loadPersonalStates();
    }

    renderHome();
  } catch(e) {
    document.getElementById('courses-list').innerHTML = `
      <div class="empty-state" style="padding:2rem 0">
        <div class="emoji">❌</div>
        <p>Error al conectar con la base de datos.<br><small>${e.message}</small></p>
      </div>`;
  }
}

init();
</script>
