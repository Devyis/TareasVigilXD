<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Cursos</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf9f6;
  --paper: #fffffe;
  --paper2: #f5f4f0;
  --line: #e8e4dc;
  --line-blue: #c8d8f0;
  --ink: #1a1a2e;
  --ink2: #4a4a6a;
  --muted: #9898b0;
  --accent: #3b5bdb;
  --accent-light: #e8edff;
  --red: #e03131;
  --red-light: #fff0f0;
  --green: #2f9e44;
  --green-light: #ebfbee;
  --orange: #e67700;
  --orange-light: #fff3e0;
  --yellow: #f59f00;
  --purple: #7048e8;
  --pink: #e64980;
  --teal: #0c8599;
  --r: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NOTEBOOK LINES BG ── */
.notebook-bg {
  background-image:
    linear-gradient(var(--line-blue) 1px, transparent 1px);
  background-size: 100% 32px;
  background-position: 0 28px;
  position: relative;
}
.notebook-bg::before {
  content: '';
  position: absolute;
  left: 64px;
  top: 0; bottom: 0;
  width: 2px;
  background: rgba(255,100,100,0.25);
  pointer-events: none;
}

/* ── SCREENS ── */
.screen {
  display: none;
  min-height: 100vh;
  flex-direction: column;
  animation: slideIn 0.25s ease;
}
.screen.active { display: flex; }
@keyframes slideIn {
  from { opacity: 0; transform: translateX(18px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slideBack {
  from { opacity: 0; transform: translateX(-18px); }
  to   { opacity: 1; transform: translateX(0); }
}
.screen.back { animation: slideBack 0.25s ease; }

/* ── TOPBAR ── */
.topbar {
  background: var(--paper);
  border-bottom: 2px solid var(--line);
  padding: 0.9rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: var(--shadow);
}

.back-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.3rem;
  color: var(--accent);
  padding: 0.2rem;
  line-height: 1;
  flex-shrink: 0;
}

.topbar-title {
  font-family: 'Caveat', cursive;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--ink);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.topbar-action {
  background: none;
  border: 2px solid var(--accent);
  color: var(--accent);
  font-family: 'Nunito', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 0.35rem 0.8rem;
  border-radius: 100px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  display: none;
}
.topbar-action:hover, .topbar-action.active {
  background: var(--accent);
  color: white;
}
body.admin-mode .topbar-action { display: block; }

/* ── SCREEN 1: HOME ── */
#screen-home {
  background: var(--bg);
}

.home-header {
  background: var(--paper);
  border-bottom: 2px solid var(--line);
  padding: 1.5rem 1.2rem 1.2rem;
  box-shadow: var(--shadow);
}

.home-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.8rem;
}

.home-title {
  font-family: 'Caveat', cursive;
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
}
.home-title span { color: var(--accent); }

.admin-btn-home {
  background: none;
  border: 2px solid var(--line);
  color: var(--muted);
  font-family: 'Nunito', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 0.3rem 0.7rem;
  border-radius: 100px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.admin-btn-home:hover, .admin-btn-home.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

.home-date {
  font-size: 0.75rem;
  color: var(--muted);
  font-style: italic;
}

.home-stats {
  display: flex;
  gap: 0.6rem;
  overflow-x: auto;
  padding-bottom: 0.2rem;
}

.stat-pill {
  background: var(--paper2);
  border: 1.5px solid var(--line);
  border-radius: 100px;
  padding: 0.3rem 0.9rem;
  font-size: 0.7rem;
  color: var(--ink2);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  flex-shrink: 0;
}
.stat-pill strong { color: var(--ink); font-weight: 700; }
.stat-pill.urgent { background: var(--red-light); border-color: #ffc9c9; color: var(--red); }
.stat-pill.urgent strong { color: var(--red); }

.courses-list {
  padding: 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
}

.course-card {
  background: var(--paper);
  border: 2px solid var(--line);
  border-radius: var(--r);
  overflow: hidden;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform 0.18s, box-shadow 0.18s;
  position: relative;
}
.course-card:hover, .course-card:active {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.course-card-accent {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 5px;
  border-radius: 0;
}

.course-card-inner {
  padding: 1rem 1rem 0.9rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.course-icon {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}

.course-info { flex: 1; min-width: 0; }

.course-card-name {
  font-family: 'Caveat', cursive;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 0.25rem;
}

.course-card-sub {
  font-size: 0.7rem;
  color: var(--muted);
}

.course-card-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.3rem;
  flex-shrink: 0;
}

.task-badge {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 0.2rem 0.6rem;
  border-radius: 100px;
}
.task-badge.none { background: var(--paper2); color: var(--muted); }
.task-badge.ok { background: var(--green-light); color: var(--green); }
.task-badge.warn { background: var(--orange-light); color: var(--orange); }
.task-badge.urgent { background: var(--red-light); color: var(--red); }

.chevron { color: var(--muted); font-size: 1rem; }

/* ── SCREEN 2: COURSE ── */
#screen-course {
  background: var(--bg);
}

.course-hero {
  padding: 1.4rem 1.2rem 1.2rem;
  border-bottom: 2px solid var(--line);
  background: var(--paper);
}

.course-hero-name {
  font-family: 'Caveat', cursive;
  font-size: 2rem;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 0.4rem;
}

.course-hero-sub {
  font-size: 0.72rem;
  color: var(--muted);
}

.tasks-section {
  padding: 1.2rem;
}

.section-title {
  font-family: 'Caveat', cursive;
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--ink2);
  margin-bottom: 0.8rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1.5px;
  background: var(--line);
}

.task-card {
  background: var(--paper);
  border: 2px solid var(--line);
  border-radius: var(--r);
  padding: 0.9rem 1rem;
  margin-bottom: 0.7rem;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform 0.18s, box-shadow 0.18s;
  display: flex;
  align-items: center;
  gap: 0.8rem;
  position: relative;
  overflow: hidden;
}
.task-card:hover, .task-card:active {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}
.task-card.urgent { border-color: #ffc9c9; background: #fffafa; }
.task-card.warn { border-color: #ffe8c0; background: #fffdf7; }

.task-card-stripe {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
}

.task-card-body { flex: 1; min-width: 0; }

.task-card-name {
  font-weight: 700;
  font-size: 0.9rem;
  margin-bottom: 0.3rem;
  color: var(--ink);
  line-height: 1.3;
}

.task-card-meta {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  flex-wrap: wrap;
}

.task-date-tag {
  font-size: 0.65rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 0.2rem;
}

.days-tag {
  font-size: 0.62rem;
  font-weight: 700;
  padding: 0.15rem 0.55rem;
  border-radius: 100px;
}
.days-ok { background: var(--green-light); color: var(--green); }
.days-warn { background: var(--orange-light); color: var(--orange); }
.days-danger { background: var(--red-light); color: var(--red); }
.days-today { background: var(--red); color: white; animation: blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.6} }

.has-pdf-tag {
  font-size: 0.6rem;
  color: var(--accent);
  background: var(--accent-light);
  padding: 0.15rem 0.5rem;
  border-radius: 100px;
}

.task-delete-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 1rem;
  padding: 0.3rem;
  border-radius: 8px;
  transition: all 0.2s;
  display: none;
  flex-shrink: 0;
}
.task-delete-btn:hover { color: var(--red); background: var(--red-light); }
body.admin-mode .task-delete-btn { display: flex; }

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--muted);
}
.empty-state .emoji { font-size: 2.5rem; margin-bottom: 0.7rem; }
.empty-state p { font-family: 'Caveat', cursive; font-size: 1.1rem; }

/* ADD TASK BUTTON */
.add-task-btn {
  width: 100%;
  background: var(--accent-light);
  border: 2px dashed var(--accent);
  color: var(--accent);
  font-family: 'Nunito', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  padding: 0.8rem;
  border-radius: var(--r);
  cursor: pointer;
  transition: all 0.2s;
  display: none;
  margin-top: 0.3rem;
}
.add-task-btn:hover { background: var(--accent); color: white; }
body.admin-mode .add-task-btn { display: block; }

/* ── SCREEN 3: TASK ── */
#screen-task {
  background: var(--bg);
}

.task-hero {
  background: var(--paper);
  border-bottom: 2px solid var(--line);
  padding: 1.2rem 1.2rem 1rem;
}

.task-hero-name {
  font-family: 'Caveat', cursive;
  font-size: 1.8rem;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 0.6rem;
}

.task-hero-meta {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  align-items: center;
}

.task-blocks {
  padding: 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.block {
  background: var(--paper);
  border: 2px solid var(--line);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.block-header {
  padding: 0.8rem 1rem;
  border-bottom: 1.5px solid var(--line);
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.block-icon {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
  flex-shrink: 0;
}

.block-title {
  font-family: 'Caveat', cursive;
  font-size: 1.1rem;
  font-weight: 700;
  flex: 1;
}

.block-body {
  padding: 1rem;
}

.pdf-item {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  padding: 0.7rem 0.8rem;
  background: var(--paper2);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  margin-bottom: 0.5rem;
  text-decoration: none;
  color: var(--ink);
  transition: all 0.18s;
}
.pdf-item:hover { border-color: var(--accent); background: var(--accent-light); }
.pdf-item:last-child { margin-bottom: 0; }

.pdf-item-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
  background: white;
  border: 1.5px solid var(--line);
}

.pdf-item-info { flex: 1; min-width: 0; }
.pdf-item-name {
  font-size: 0.8rem;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pdf-item-sub { font-size: 0.62rem; color: var(--muted); }

.pdf-item-arrow { color: var(--muted); font-size: 0.9rem; }

.block-empty {
  text-align: center;
  padding: 1.2rem;
  color: var(--muted);
  font-size: 0.75rem;
  font-style: italic;
}

/* Admin: upload row inside block */
.upload-row {
  display: none;
  margin-top: 0.7rem;
  gap: 0.5rem;
  align-items: center;
  flex-wrap: wrap;
}
body.admin-mode .upload-row { display: flex; }

.upload-input-text {
  flex: 1;
  min-width: 120px;
  background: var(--paper2);
  border: 1.5px solid var(--line);
  border-radius: 8px;
  padding: 0.5rem 0.7rem;
  font-family: 'Nunito', sans-serif;
  font-size: 0.75rem;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}
.upload-input-text:focus { border-color: var(--accent); }
.upload-input-text::placeholder { color: var(--muted); }

.upload-save-btn {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 0.5rem 0.9rem;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s;
}
.upload-save-btn:hover { background: #2f4dcc; }

.delete-pdf-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.9rem;
  padding: 0.2rem;
  display: none;
  transition: color 0.2s;
}
.delete-pdf-btn:hover { color: var(--red); }
body.admin-mode .delete-pdf-btn { display: inline-flex; }

/* ── ADD TASK MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,26,46,0.6);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal-sheet {
  background: var(--paper);
  border-radius: 18px 18px 0 0;
  border: 2px solid var(--line);
  border-bottom: none;
  width: 100%;
  max-width: 600px;
  padding: 0 1.3rem 2rem;
  transform: translateY(30px);
  transition: transform 0.28s cubic-bezier(0.16,1,0.3,1);
  max-height: 85vh;
  overflow-y: auto;
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }

.modal-handle {
  width: 38px; height: 4px;
  background: var(--line);
  border-radius: 2px;
  margin: 1rem auto 1.2rem;
}

.modal-title {
  font-family: 'Caveat', cursive;
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 1.1rem;
}

.form-group { margin-bottom: 0.9rem; }
.form-label {
  display: block;
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--ink2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.35rem;
}
.form-control {
  width: 100%;
  background: var(--paper2);
  border: 2px solid var(--line);
  border-radius: 10px;
  padding: 0.65rem 0.9rem;
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}
.form-control:focus { border-color: var(--accent); }
input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }

.modal-footer {
  display: flex;
  gap: 0.6rem;
  justify-content: flex-end;
  margin-top: 1.1rem;
}
.btn-cancel {
  background: var(--paper2);
  border: 2px solid var(--line);
  color: var(--ink2);
  font-family: 'Nunito', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  padding: 0.6rem 1.2rem;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-cancel:hover { border-color: var(--muted); }
.btn-confirm {
  background: var(--accent);
  border: 2px solid var(--accent);
  color: white;
  font-family: 'Nunito', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  padding: 0.6rem 1.4rem;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-confirm:hover { background: #2f4dcc; }

/* ── PASSWORD MODAL ── */
.pw-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,26,46,0.7);
  backdrop-filter: blur(8px);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.pw-overlay.open { opacity: 1; pointer-events: all; }

.pw-box {
  background: var(--paper);
  border: 2px solid var(--line);
  border-radius: 18px;
  padding: 1.8rem;
  width: 90%;
  max-width: 320px;
  box-shadow: var(--shadow-lg);
}
.pw-box-title {
  font-family: 'Caveat', cursive;
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 0.3rem;
}
.pw-box-sub { font-size: 0.72rem; color: var(--muted); margin-bottom: 1rem; }
.pw-error { font-size: 0.7rem; color: var(--red); margin-top: 0.4rem; display: none; }
.pw-error.show { display: block; }

/* ── NOTEBOOK STICKER DECORATION ── */
.sticker {
  display: inline-block;
  font-size: 1.1rem;
  transform: rotate(-4deg);
}

@media (max-width: 480px) {
  .home-title { font-size: 2rem; }
  .course-card-name { font-size: 1.1rem; }
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     SCREEN 1 — HOME
══════════════════════════════════════════ -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div class="home-top">
      <div>
        <div class="home-title">mis <span>cursos</span> <span class="sticker">📓</span></div>
        <div class="home-date" id="home-date"></div>
      </div>
      <button class="admin-btn-home" id="admin-btn" onclick="openPwModal()">⚙ admin</button>
    </div>
    <div class="home-stats" id="home-stats"></div>
  </div>
  <div class="courses-list" id="courses-list"></div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 2 — COURSE
══════════════════════════════════════════ -->
<div id="screen-course" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goBack('home')">←</button>
    <div class="topbar-title" id="course-topbar-title"></div>
    <button class="topbar-action" id="add-task-btn" onclick="openAddModal()">+ tarea</button>
  </div>
  <div class="course-hero">
    <div class="course-hero-name" id="course-hero-name"></div>
    <div class="course-hero-sub" id="course-hero-sub"></div>
  </div>
  <div class="tasks-section">
    <div class="section-title">📋 tareas pendientes</div>
    <div id="tasks-list"></div>
    <button class="add-task-btn" onclick="openAddModal()">＋ agregar tarea</button>
  </div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 3 — TASK DETAIL
══════════════════════════════════════════ -->
<div id="screen-task" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goBack('course')">←</button>
    <div class="topbar-title" id="task-topbar-title"></div>
  </div>
  <div class="task-hero">
    <div class="task-hero-name" id="task-hero-name"></div>
    <div class="task-hero-meta" id="task-hero-meta"></div>
  </div>
  <div class="task-blocks">

    <!-- BLOQUE 1: PDF Teoría -->
    <div class="block">
      <div class="block-header">
        <div class="block-icon" style="background:#e8edff">📘</div>
        <div class="block-title">PDF Teoría</div>
      </div>
      <div class="block-body">
        <div id="block-teoria-list"></div>
        <div class="upload-row">
          <input class="upload-input-text" id="input-teoria" type="text" placeholder="nombre-archivo.pdf">
          <button class="upload-save-btn" onclick="addPdf('teoria')">Agregar</button>
        </div>
      </div>
    </div>

    <!-- BLOQUE 2: PDF Tarea -->
    <div class="block">
      <div class="block-header">
        <div class="block-icon" style="background:#ebfbee">📗</div>
        <div class="block-title">PDF Tarea</div>
      </div>
      <div class="block-body">
        <div id="block-tarea-list"></div>
        <div class="upload-row">
          <input class="upload-input-text" id="input-tarea" type="text" placeholder="nombre-archivo.pdf">
          <button class="upload-save-btn" onclick="addPdf('tarea')">Agregar</button>
        </div>
      </div>
    </div>

    <!-- BLOQUE 3: Archivos adjuntos -->
    <div class="block">
      <div class="block-header">
        <div class="block-icon" style="background:#fff3e0">📎</div>
        <div class="block-title">Archivos adjuntos</div>
      </div>
      <div class="block-body">
        <div id="block-adjuntos-list"></div>
        <div class="upload-row">
          <input class="upload-input-text" id="input-adjuntos" type="text" placeholder="nombre-archivo.pdf">
          <button class="upload-save-btn" onclick="addPdf('adjuntos')">Agregar</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="add-modal" onclick="closeAddModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ nueva tarea</div>
    <div class="form-group">
      <label class="form-label">Nombre de la tarea</label>
      <input class="form-control" id="f-name" type="text" placeholder="ej: Trabajo Práctico N°2">
    </div>
    <div class="form-group">
      <label class="form-label">Fecha límite</label>
      <input class="form-control" id="f-date" type="date">
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeAddModalDirect()">Cancelar</button>
      <button class="btn-confirm" onclick="saveTask()">Guardar</button>
    </div>
  </div>
</div>

<!-- PASSWORD MODAL -->
<div class="pw-overlay" id="pw-modal">
  <div class="pw-box">
    <div class="pw-box-title">🔐 modo admin</div>
    <div class="pw-box-sub">Ingresá la contraseña para gestionar tareas y archivos.</div>
    <input class="form-control" id="pw-input" type="password" placeholder="contraseña" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="pw-error" id="pw-error">Contraseña incorrecta ✗</div>
    <div class="modal-footer" style="margin-top:1rem">
      <button class="btn-cancel" onclick="closePwModal()">Cancelar</button>
      <button class="btn-confirm" onclick="checkPw()">Entrar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// CONFIG — cambiá la contraseña acá
// ═══════════════════════════════════════════
const ADMIN_PASSWORD = 'admin123';
const PDF_BASE = './pdfs/';

// ═══════════════════════════════════════════
// CURSOS — cambiá los nombres si querés
// ═══════════════════════════════════════════
const COURSES = [
  { id: 'logica',      name: 'Lógica de Programación',         icon: '🧠', color: '#3b5bdb', bg: '#e8edff' },
  { id: 'java',        name: 'Java',                            icon: '☕', color: '#e67700', bg: '#fff3e0' },
  { id: 'ads',         name: 'ADS',                             icon: '📐', color: '#7048e8', bg: '#f3f0ff' },
  { id: 'bdatos',      name: 'Diseño de Base de Datos',         icon: '🗄️', color: '#0c8599', bg: '#e3fafc' },
  { id: 'innova',      name: 'Fundamentos de Innovación Tec.',  icon: '💡', color: '#2f9e44', bg: '#ebfbee' },
];

// ═══════════════════════════════════════════
// DATOS DEMO
// ═══════════════════════════════════════════
function makeDemoData() {
  const add = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x.toISOString().split('T')[0]; };
  const t = new Date();
  return {
    logica: [
      { id: 1, name: 'TP N°2 — Estructuras de control', deadline: add(t,3), pdfs: { teoria: ['teoria-estructuras.pdf'], tarea: ['tp2-enunciado.pdf'], adjuntos: [] } },
      { id: 2, name: 'Parcial domiciliario', deadline: add(t,6), pdfs: { teoria: [], tarea: [], adjuntos: [] } },
    ],
    java: [
      { id: 3, name: 'Entrega proyecto POO', deadline: add(t,1), pdfs: { teoria: [], tarea: ['poo-consigna.pdf'], adjuntos: [] } },
    ],
    ads: [
      { id: 4, name: 'Diagrama de casos de uso', deadline: add(t,0), pdfs: { teoria: [], tarea: [], adjuntos: [] } },
      { id: 5, name: 'Informe de relevamiento', deadline: add(t,8), pdfs: { teoria: ['guia-relevamiento.pdf'], tarea: [], adjuntos: [] } },
    ],
    bdatos: [],
    innova: [
      { id: 6, name: 'Presentación grupal', deadline: add(t,4), pdfs: { teoria: [], tarea: [], adjuntos: ['rubrica.pdf'] } },
    ],
  };
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let tasks   = JSON.parse(localStorage.getItem('tasks_v2') || 'null') || makeDemoData();
let isAdmin = false;
let activeCourseId = null;
let activeTaskId   = null;

function save() { localStorage.setItem('tasks_v2', JSON.stringify(tasks)); }

// Auto-borrado: 1 día después de la fecha límite
function autoDelete() {
  const today = new Date(); today.setHours(0,0,0,0);
  let changed = false;
  for (const cid in tasks) {
    const before = tasks[cid].length;
    tasks[cid] = tasks[cid].filter(t => {
      const dl = new Date(t.deadline + 'T00:00:00');
      return Math.floor((today - dl) / 86400000) <= 0;
    });
    if (tasks[cid].length !== before) changed = true;
  }
  if (changed) save();
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function daysLeft(dl) {
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.floor((new Date(dl+'T00:00:00') - today) / 86400000);
}

function daysChip(d) {
  if (d < 0)  return `<span class="days-tag days-danger">vencida</span>`;
  if (d === 0) return `<span class="days-tag days-today">¡hoy!</span>`;
  if (d === 1) return `<span class="days-tag days-danger">1 día</span>`;
  if (d <= 3)  return `<span class="days-tag days-warn">${d} días</span>`;
  return `<span class="days-tag days-ok">${d} días</span>`;
}

function urgencyBadge(courseTasks) {
  if (!courseTasks.length) return '<span class="task-badge none">sin tareas</span>';
  const min = Math.min(...courseTasks.map(t => daysLeft(t.deadline)));
  const n = courseTasks.length;
  if (min <= 1)  return `<span class="task-badge urgent">⚠ ${n} tarea${n!==1?'s':''}</span>`;
  if (min <= 3)  return `<span class="task-badge warn">🕐 ${n} tarea${n!==1?'s':''}</span>`;
  return `<span class="task-badge ok">✓ ${n} tarea${n!==1?'s':''}</span>`;
}

function fmtDate(iso) {
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function hasPdfs(task) {
  return (task.pdfs.teoria.length + task.pdfs.tarea.length + task.pdfs.adjuntos.length) > 0;
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function showScreen(id, dir='forward') {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active','back');
  });
  const s = document.getElementById('screen-'+id);
  s.classList.add('active');
  if (dir === 'back') s.classList.add('back');
  window.scrollTo(0,0);
}

function goBack(to) {
  showScreen(to, 'back');
  if (to === 'home') renderHome();
  if (to === 'course') renderCourse(activeCourseId);
}

// ═══════════════════════════════════════════
// RENDER HOME
// ═══════════════════════════════════════════
function renderHome() {
  // date
  document.getElementById('home-date').textContent =
    new Date().toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  // stats
  let total = 0, urgent = 0;
  for (const cid in tasks) {
    tasks[cid].forEach(t => {
      total++;
      const d = daysLeft(t.deadline);
      if (d <= 1) urgent++;
    });
  }
  document.getElementById('home-stats').innerHTML = `
    <div class="stat-pill">📚 <strong>${COURSES.length}</strong> cursos</div>
    <div class="stat-pill">📋 <strong>${total}</strong> tareas</div>
    ${urgent > 0 ? `<div class="stat-pill urgent">⚠ <strong>${urgent}</strong> urgente${urgent!==1?'s':''}</div>` : ''}
  `;

  // courses
  document.getElementById('courses-list').innerHTML = COURSES.map(c => {
    const ct = tasks[c.id] || [];
    return `<div class="course-card" onclick="openCourse('${c.id}')">
      <div class="course-card-accent" style="background:${c.color}"></div>
      <div class="course-card-inner">
        <div class="course-icon" style="background:${c.bg}">${c.icon}</div>
        <div class="course-info">
          <div class="course-card-name">${c.name}</div>
          <div class="course-card-sub">${c.id.toUpperCase()}</div>
        </div>
        <div class="course-card-right">
          ${urgencyBadge(ct)}
          <span class="chevron">›</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
// RENDER COURSE
// ═══════════════════════════════════════════
function openCourse(cid) {
  activeCourseId = cid;
  renderCourse(cid);
  showScreen('course');
}

function renderCourse(cid) {
  const c = COURSES.find(x => x.id === cid);
  const ct = (tasks[cid] || []).slice().sort((a,b) => new Date(a.deadline)-new Date(b.deadline));

  document.getElementById('course-topbar-title').textContent = c.name;
  document.getElementById('course-hero-name').textContent = c.icon + ' ' + c.name;
  document.getElementById('course-hero-sub').textContent =
    ct.length ? `${ct.length} tarea${ct.length!==1?'s':''} pendiente${ct.length!==1?'s':''}` : 'Sin tareas pendientes';

  const list = document.getElementById('tasks-list');
  if (!ct.length) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">🎉</div><p>¡Todo al día!</p></div>`;
    return;
  }

  list.innerHTML = ct.map(t => {
    const d = daysLeft(t.deadline);
    const cls = d <= 1 ? 'urgent' : d <= 3 ? 'warn' : '';
    const stripe = d <= 1 ? '#ff6b6b' : d <= 3 ? '#ffb347' : c.color;
    const pdftag = hasPdfs(t) ? '<span class="has-pdf-tag">📎 PDFs</span>' : '';
    return `<div class="task-card ${cls}" onclick="openTask('${cid}',${t.id})">
      <div class="task-card-stripe" style="background:${stripe}"></div>
      <div class="task-card-body">
        <div class="task-card-name">${t.name}</div>
        <div class="task-card-meta">
          <span class="task-date-tag">📅 ${fmtDate(t.deadline)}</span>
          ${daysChip(d)}
          ${pdftag}
        </div>
      </div>
      <button class="task-delete-btn" onclick="deleteTask(event,'${cid}',${t.id})">🗑</button>
      <span style="color:var(--muted);font-size:1rem">›</span>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
// RENDER TASK DETAIL
// ═══════════════════════════════════════════
function openTask(cid, tid) {
  activeCourseId = cid;
  activeTaskId   = tid;
  const task = tasks[cid].find(t => t.id === tid);
  if (!task) return;
  const c = COURSES.find(x => x.id === cid);
  const d = daysLeft(task.deadline);

  document.getElementById('task-topbar-title').textContent = task.name;
  document.getElementById('task-hero-name').textContent = task.name;
  document.getElementById('task-hero-meta').innerHTML = `
    <span class="task-date-tag" style="font-size:0.75rem">📅 ${fmtDate(task.deadline)}</span>
    ${daysChip(d)}
    <span style="font-size:0.72rem;color:var(--muted)">${c.icon} ${c.name}</span>
  `;

  renderPdfBlock('teoria',   task);
  renderPdfBlock('tarea',    task);
  renderPdfBlock('adjuntos', task);

  // clear inputs
  ['teoria','tarea','adjuntos'].forEach(k => {
    const el = document.getElementById('input-'+k);
    if (el) el.value = '';
  });

  showScreen('task');
}

function renderPdfBlock(type, task) {
  const list = document.getElementById('block-'+type+'-list');
  const pdfs = task.pdfs[type] || [];
  if (!pdfs.length) {
    list.innerHTML = `<div class="block-empty">Sin archivos aún</div>`;
    return;
  }
  list.innerHTML = pdfs.map((pdf, i) => `
    <a class="pdf-item" href="${PDF_BASE}${pdf}" target="_blank">
      <div class="pdf-item-icon">📄</div>
      <div class="pdf-item-info">
        <div class="pdf-item-name">${pdf}</div>
        <div class="pdf-item-sub">Toca para abrir</div>
      </div>
      <button class="delete-pdf-btn" onclick="deletePdf(event,'${type}',${i})">✕</button>
      <span class="pdf-item-arrow">›</span>
    </a>
  `).join('');
}

function addPdf(type) {
  const input = document.getElementById('input-'+type);
  const val = input.value.trim();
  if (!val) return;
  const task = tasks[activeCourseId].find(t => t.id === activeTaskId);
  if (!task.pdfs[type]) task.pdfs[type] = [];
  task.pdfs[type].push(val);
  save();
  renderPdfBlock(type, task);
  input.value = '';
}

function deletePdf(e, type, idx) {
  e.preventDefault(); e.stopPropagation();
  const task = tasks[activeCourseId].find(t => t.id === activeTaskId);
  task.pdfs[type].splice(idx, 1);
  save();
  renderPdfBlock(type, task);
}

// ═══════════════════════════════════════════
// TASKS CRUD
// ═══════════════════════════════════════════
function openAddModal() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('f-name').value = '';
  document.getElementById('f-date').value = today;
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 100);
}

function closeAddModal(e) {
  if (e.target === document.getElementById('add-modal')) closeAddModalDirect();
}
function closeAddModalDirect() {
  document.getElementById('add-modal').classList.remove('open');
}

function saveTask() {
  const name = document.getElementById('f-name').value.trim();
  const date = document.getElementById('f-date').value;
  if (!name || !date) { alert('Completá nombre y fecha.'); return; }
  const id = Date.now();
  if (!tasks[activeCourseId]) tasks[activeCourseId] = [];
  tasks[activeCourseId].push({ id, name, deadline: date, pdfs: { teoria:[], tarea:[], adjuntos:[] } });
  save();
  closeAddModalDirect();
  renderCourse(activeCourseId);
  renderHome();
}

function deleteTask(e, cid, tid) {
  e.stopPropagation();
  if (!confirm('¿Eliminar esta tarea?')) return;
  tasks[cid] = tasks[cid].filter(t => t.id !== tid);
  save();
  renderCourse(cid);
  renderHome();
}

// ═══════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════
function openPwModal() {
  if (isAdmin) { disableAdmin(); return; }
  document.getElementById('pw-modal').classList.add('open');
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}

function closePwModal() {
  document.getElementById('pw-modal').classList.remove('open');
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').classList.remove('show');
}

function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === ADMIN_PASSWORD) {
    isAdmin = true;
    document.body.classList.add('admin-mode');
    document.getElementById('admin-btn').classList.add('active');
    document.getElementById('admin-btn').textContent = '✓ admin';
    closePwModal();
  } else {
    document.getElementById('pw-error').classList.add('show');
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function disableAdmin() {
  isAdmin = false;
  document.body.classList.remove('admin-mode');
  document.getElementById('admin-btn').classList.remove('active');
  document.getElementById('admin-btn').textContent = '⚙ admin';
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
autoDelete();
renderHome();
</script>
</body>
</html>
